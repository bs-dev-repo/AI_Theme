<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accentrix Theme System</title>

<style>
:root {
  --primary: #4f46e5;
  --secondary: #06b6d4;
  --bg: #ffffff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: #111;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* TOP PANEL */
.top-bar {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

input, select {
  padding: 6px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* SVG LOGO */
.logo svg {
  width: 40px;
  height: 40px;
}

.logo-text {
  font-weight: bold;
  font-size: 20px;
}

/* BUTTON */
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* BUTTON TYPES */
.solid { background: var(--primary); color: #fff; }
.outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
.gradient { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; }

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.gradient-text {
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  color: transparent;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  background: #fff;
}

.shadow { box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
.border { border-top: 4px solid var(--primary); }

.divider {
  height: 4px;
  margin: 30px 0;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
}
</style>
</head>

<body>

<div class="container">

<!-- CONTROL PANEL -->
<div class="top-bar">

  <!-- COLORS -->
  <input type="text" id="pHex" value="#4f46e5">
  <input type="text" id="sHex" value="#06b6d4">

  <input type="text" id="pRGB" value="79,70,229">
  <input type="text" id="sRGB" value="6,182,212">

  <!-- BACKGROUND -->
  <select onchange="setBg(this.value)">
    <option value="#ffffff">White</option>
    <option value="#f1f5f9">Light Gray</option>
    <option value="gradient">Gradient</option>
  </select>

  <!-- BUTTON -->
  <select onchange="setButton(this.value)">
    <option value="solid">Solid</option>
    <option value="outline">Outline</option>
    <option value="gradient">Gradient</option>
  </select>

  <!-- CARD -->
  <select onchange="setCard(this.value)">
    <option value="flat">Flat</option>
    <option value="shadow">Shadow</option>
    <option value="border">Border Accent</option>
  </select>

</div>

<!-- HEADER -->
<header>
  <div class="logo-wrap">

    <!-- SVG LOGO -->
    <div class="logo">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="var(--primary)"/>
        <path d="M30 60 L50 30 L70 60 Z" fill="var(--secondary)"/>
      </svg>
    </div>

    <div class="logo-text">Accentrix.ai</div>
  </div>

  <button class="btn solid" id="mainBtn">Book Demo</button>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="gradient-text">AI Commerce Intelligence</h1>
  <p>Customize theme, preview components, finalize branding.</p>
  <button class="btn solid" id="heroBtn">Get Started</button>
</section>

<div class="divider"></div>

<!-- CARDS -->
<div class="grid" id="cards">
  <div class="card">AI Search</div>
  <div class="card">Recommendations</div>
  <div class="card">Analytics</div>
</div>

</div>

<script>
// COLOR
function setPrimary(hex){ document.documentElement.style.setProperty('--primary', hex); }
function setSecondary(hex){ document.documentElement.style.setProperty('--secondary', hex); }

function rgbToHex(rgb){
 let [r,g,b]=rgb.split(',').map(Number);
 return "#" + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

pHex.oninput = ()=> setPrimary(pHex.value);
sHex.oninput = ()=> setSecondary(sHex.value);

pRGB.oninput = ()=>{
 let hex=rgbToHex(pRGB.value);
 pHex.value=hex;
 setPrimary(hex);
};

sRGB.oninput = ()=>{
 let hex=rgbToHex(sRGB.value);
 sHex.value=hex;
 setSecondary(hex);
};

// BG
function setBg(val){
 if(val==="gradient"){
  document.body.style.background = `linear-gradient(135deg, var(--primary), var(--secondary))`;
 } else {
  document.body.style.background = val;
 }
}

// BUTTON
function setButton(type){
 let btns=document.querySelectorAll('.btn');
 btns.forEach(b=>{
  b.className='btn '+type;
 });
}

// CARD
function setCard(type){
 let cards=document.querySelectorAll('.card');
 cards.forEach(c=>{
  c.className='card';
  if(type==='shadow') c.classList.add('shadow');
  if(type==='border') c.classList.add('border');
 });
}
</script>

</body>
</html>
