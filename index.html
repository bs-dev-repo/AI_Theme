<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accentrix Ultimate Theme System</title>

<style>
:root {
  --primary:#4f46e5;
  --secondary:#06b6d4;
  --bg:#ffffff;
}

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  transition:0.3s;
}

.container {max-width:1200px;margin:auto;padding:20px;}

.top-bar {
  background:#fff;padding:15px;border-radius:12px;
  display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;
}

header {display:flex;justify-content:space-between;align-items:center;}

.logo svg{width:40px;}
.logo-wrap{display:flex;gap:10px;align-items:center;}

.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;}
.solid{background:var(--primary);color:#fff;}
.gradient{background:linear-gradient(90deg,var(--primary),var(--secondary));color:#fff;}

.hero{text-align:center;padding:70px 20px;animation:fadeUp 0.8s;}

.gradient-text{
 background:linear-gradient(90deg,var(--primary),var(--secondary));
 -webkit-background-clip:text;color:transparent;
}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.card{padding:20px;border-radius:12px;background:#fff;}
.shadow{box-shadow:0 10px 20px rgba(0,0,0,0.08);}
.border{border-top:4px solid var(--primary);}

.usecase{
 margin-top:40px;padding:30px;border-radius:12px;
 background:linear-gradient(90deg,var(--primary),var(--secondary));
 color:#fff;text-align:center;
}

.alt .hero{text-align:left;}

@keyframes fadeUp{
 from{opacity:0;transform:translateY(20px);}
 to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="app">

<!-- CONTROL PANEL -->
<div class="top-bar">

<input id="pHex" value="#4f46e5">
<input id="sHex" value="#06b6d4">

<select onchange="setLayout(this.value)">
<option value="default">Layout A</option>
<option value="alt">Layout B</option>
</select>

<select onchange="setButton(this.value)">
<option value="solid">Button Solid</option>
<option value="gradient">Button Gradient</option>
</select>

<select onchange="setCard(this.value)">
<option value="flat">Card Flat</option>
<option value="shadow">Card Shadow</option>
<option value="border">Card Border</option>
</select>

<select onchange="setBg(this.value)">
<option value="white">White</option>
<option value="gray">Light Gray</option>
<option value="gradient">Gradient</option>
</select>

<button onclick="exportTheme()">Export Theme</button>

</div>

<!-- HEADER -->
<header>
<div class="logo-wrap">
<div class="logo">
<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="40" fill="var(--primary)"/>
<path d="M30 60 L50 30 L70 60 Z" fill="var(--secondary)"/>
</svg>
</div>
<b>Accentrix.ai</b>
</div>

<button class="btn solid">Book Demo</button>
</header>

<!-- HERO -->
<section class="hero">
<h1 class="gradient-text">Turn Search into Revenue</h1>
<p>AI-powered discovery & personalization</p>
<button class="btn solid">Get Started</button>
</section>

<!-- FEATURES -->
<div class="grid" id="cards">
<div class="card">AI Search</div>
<div class="card">Recommendations</div>
<div class="card">Merchandising</div>
</div>

<!-- USE CASE -->
<div class="usecase">
<h2>Before vs After Accentrix</h2>
<p>❌ Generic Search → Low Conversion</p>
<p>✅ AI Intent → Higher Revenue</p>
</div>

</div>

<script>
// COLORS
pHex.oninput=()=>document.documentElement.style.setProperty('--primary',pHex.value);
sHex.oninput=()=>document.documentElement.style.setProperty('--secondary',sHex.value);

// LAYOUT
function setLayout(type){
 let app=document.getElementById("app");
 type==="alt"?app.classList.add("alt"):app.classList.remove("alt");
}

// BUTTON
function setButton(type){
 document.querySelectorAll('.btn').forEach(b=>b.className='btn '+type);
}

// CARD
function setCard(type){
 document.querySelectorAll('.card').forEach(c=>{
  c.className='card';
  if(type==='shadow') c.classList.add('shadow');
  if(type==='border') c.classList.add('border');
 });
}

// BG
function setBg(val){
 if(val==="gradient"){
  document.body.style.background=`linear-gradient(135deg,var(--primary),var(--secondary))`;
 } else if(val==="gray"){
  document.body.style.background="#f1f5f9";
 } else {
  document.body.style.background="#ffffff";
 }
}

// EXPORT
function exportTheme(){
 const theme={
  primary:pHex.value,
  secondary:sHex.value
 };

 const data="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(theme,null,2));
 const a=document.createElement('a');
 a.href=data;
 a.download="theme.json";
 a.click();
}
</script>

</body>
</html>
