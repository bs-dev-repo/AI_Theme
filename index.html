<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accentrix Theme Builder</title>

<style>
:root {
  --primary: #4f46e5;
  --secondary: #06b6d4;
  --bg: #f8fafc;
  --text: #0f172a;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* TOP PANEL */
.top-bar {
  background: white;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-bottom: 20px;
}

input {
  padding: 6px;
}

label {
  font-size: 12px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-box {
  width: 35px;
  height: 35px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.logo-text {
  font-weight: bold;
  font-size: 20px;
}

/* BUTTON */
.btn {
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 70px 20px;
}

.gradient-text {
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  color: transparent;
}

/* COMPONENT PREVIEW */
.preview {
  margin-top: 40px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  border-top: 4px solid var(--primary);
}

.badge {
  display: inline-block;
  padding: 5px 10px;
  background: var(--primary);
  color: white;
  border-radius: 20px;
  font-size: 12px;
}

.divider {
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  margin: 40px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- CONTROL PANEL -->
<div class="top-bar">

  <div>
    <label>Primary HEX</label><br>
    <input type="text" id="primaryHex" value="#4f46e5">
  </div>

  <div>
    <label>Primary RGB</label><br>
    <input type="text" id="primaryRGB" value="79,70,229">
  </div>

  <div>
    <label>Secondary HEX</label><br>
    <input type="text" id="secondaryHex" value="#06b6d4">
  </div>

  <div>
    <label>Secondary RGB</label><br>
    <input type="text" id="secondaryRGB" value="6,182,212">
  </div>

</div>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <div class="logo-box"></div>
    <div class="logo-text">Accentrix.ai</div>
  </div>
  <button class="btn">Book Demo</button>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="gradient-text">AI Commerce Intelligence Platform</h1>
  <p>Live preview your branding system before development.</p>
  <br>
  <button class="btn">Get Started</button>
</section>

<div class="divider"></div>

<!-- COMPONENT PREVIEW -->
<section class="preview">

  <span class="badge">Live Component Preview</span>

  <div class="card-grid">
    <div class="card">
      <h3>Search AI</h3>
      <p>Intent-based results.</p>
      <button class="btn">Explore</button>
    </div>

    <div class="card">
      <h3>Recommendations</h3>
      <p>Personalized suggestions.</p>
      <button class="btn">Explore</button>
    </div>

    <div class="card">
      <h3>Analytics</h3>
      <p>Real-time insights.</p>
      <button class="btn">Explore</button>
    </div>
  </div>

</section>

</div>

<script>
// HEX → APPLY
function setPrimary(hex) {
  document.documentElement.style.setProperty('--primary', hex);
}
function setSecondary(hex) {
  document.documentElement.style.setProperty('--secondary', hex);
}

// RGB → HEX
function rgbToHex(rgb) {
  let [r,g,b] = rgb.split(',').map(Number);
  return "#" + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

// EVENTS
document.getElementById("primaryHex").addEventListener("input", function() {
  setPrimary(this.value);
});

document.getElementById("secondaryHex").addEventListener("input", function() {
  setSecondary(this.value);
});

document.getElementById("primaryRGB").addEventListener("input", function() {
  let hex = rgbToHex(this.value);
  document.getElementById("primaryHex").value = hex;
  setPrimary(hex);
});

document.getElementById("secondaryRGB").addEventListener("input", function() {
  let hex = rgbToHex(this.value);
  document.getElementById("secondaryHex").value = hex;
  setSecondary(hex);
});
</script>

</body>
</html>
